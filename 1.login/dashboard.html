<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body>

<h1>Welcome User</h1>

<button onclick="logout()">Logout</button>

<script type="module">

import { auth } from './firebase.js';
import { signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.logout = function(){

signOut(auth).then(()=>{

alert("Logged out");

window.location.href="login.html";

});

}

</script>

</body>
</html>
